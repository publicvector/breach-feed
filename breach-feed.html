<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Breach Monitor</title>
    <style>
        :root {
            --bg: #0f0f23;
            --card-bg: #1a1a2e;
            --border: #2a2a4a;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .nav-stats {
            display: flex;
            gap: 20px;
        }
        
        .nav-stat {
            text-align: center;
        }
        
        .nav-stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .nav-stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .main {
            display: flex;
            min-height: calc(100vh - 70px);
        }
        
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }
        
        .filter-section {
            margin-bottom: 25px;
        }
        
        .filter-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .filter-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .quick-filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .quick-btn {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            text-align: left;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quick-btn:hover, .quick-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .quick-btn .count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        .content {
            flex: 1;
            padding: 25px;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 15px;
            width: 300px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.9rem;
            width: 100%;
            margin-left: 10px;
        }
        
        .search-box input:focus {
            outline: none;
        }
        
        .search-box input::placeholder {
            color: var(--text-dim);
        }
        
        .results-count {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .breach-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }
        
        .breach-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .breach-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .breach-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .company-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            text-decoration: none;
            word-break: break-word;
        }
        
        .company-name:hover {
            color: var(--accent);
        }
        
        .industry-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-hover);
            white-space: nowrap;
        }
        
        .breach-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .attacker-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        
        .date-badge {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }
        
        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">⚠️</div>
            <span>Breach Monitor</span>
        </div>
        <div class="nav-stats">
            <div class="nav-stat">

            <div class="nav-stat">

        </div>
    </nav>
    
    <div class="main">
        <aside class="sidebar">
            <div class="filter-section">

                <div class="search-box">
                    <span>🔎</span>
                    <input type="text" id="searchInput" placeholder="Search companies...">

            </div>
            
            <div class="filter-section">
                <div class="filter-title">🏭 Industry</div>
                <select class="filter-select" id="industryFilter">
                    <option value="">All Industries</option>

                </select>
            </div>
            
            <div class="filter-section">
                <div class="filter-title">💀 Attacker Group</div>
                <select class="filter-select" id="attackerFilter">
                    <option value="">All Attackers</option>
                    <option value="Ailock">Ailock</option><option value="Akira">Akira</option><option value="Coinbasecartel">Coinbasecartel</option><option value="Dragonforce">Dragonforce</option><option value="Handala">Handala</option><option value="Incransom">Incransom</option><option value="Insomnia">Insomnia</option><option value="Nightspire">Nightspire</option><option value="Play">Play</option><option value="Qilin">Qilin</option><option value="Safepay">Safepay</option><option value="Shinyhunters">Shinyhunters</option><option value="Sinobi">Sinobi</option><option value="Thegentlemen">Thegentlemen</option><option value="Worldleaks">Worldleaks</option>

            <div class="filter-section">

                <select class="filter-select" id="dateFilter">
                    <option value="">All Dates</option>
                    <option value="2026-03-20">2026-03-20</option><option value="2026-03-19">2026-03-19</option><option value="2026-03-18">2026-03-18</option><option value="2026-03-17">2026-03-17</option><option value="2026-03-16">2026-03-16</option>
                </select>
            </div>
            
            <div class="filter-section">
                <div class="filter-title">⚡ Quick Filters</div>
                <div class="quick-filters">
                    <button class="quick-btn" onclick="filterByIndustry('Healthcare')">
                        🏥 Healthcare <span class="count">1</span>
                    </button>
                    <button class="quick-btn" onclick="filterByIndustry('Financial')">
                        🏦 Financial <span class="count">0</span>
                    </button>
                    <button class="quick-btn" onclick="filterByIndustry('Technology')">
                        💻 Technology <span class="count">2</span>
                    </button>
                    <button class="quick-btn" onclick="filterByIndustry('Government')">
                        🏛️ Government <span class="count">1</span>
                    </button>
                </div>
            </div>
            
            <div class="filter-section">
                <button class="quick-btn" onclick="clearFilters()" style="width:100%; justify-content:center;">
                    ✖️ Clear All Filters
                </button>
            </div>
        </aside>
        
        <main class="content">
            <div class="content-header">
                <div class="results-count">Showing <span id="showingCount">25</span> breaches</div>
            </div>
            
            <div class="breach-grid" id="breachGrid">
                <!-- Cards rendered by JavaScript -->
            </div>
            
            <div class="no-results" id="noResults" style="display:none;">
                <div class="no-results-icon">🔍</div>
                <div>No breaches match your filters</div>
            </div>
        </main>
    </div>

19", "attacker": "Akira", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/QW5ndXMtWW91bmcgQXNzb2NpYXRlc0Bha2lyYQ==", "desc": ""}, {"company": "Verimatrix", "date": "2026-03-19", "attacker": "Coinbasecartel", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/VmVyaW1hdHJpeEBjb2luYmFzZWNhcnRlbA==", "desc": ""}, {"company": "Mossad\u2019s Secret Treasury Exposed: 50,000 Confidential Emails Leaked", "date": "2026-03-17", "attacker": "Handala", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/TW9zc2Fk4oCZcyBTZWNyZXQgVHJlYXN1cnkgRXhwb3NlZDogNTAsMDAwIENvbmZpZGVudGlhbCBFbWFpbHMgTGVha2VkQGhhbmRhbGE=", "desc": ""}, {"company": "Productos La Aguadillana", "date": "2026-03-18", "attacker": "Qilin", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/UHJvZHVjdG9zIExhIEFndWFkaWxsYW5hQHFpbGlu", "desc": ""}, {"company": "Von Weise Associates", "date": "2026-03-16", "attacker": "Qilin", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/Vm9uIFdlaXNlIEFzc29jaWF0ZXNAcWlsaW4=", "desc": ""}, {"company": "Excellentiam", "date": "2026-03-18", "attacker": "Thegentlemen", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/RXhjZWxsZW50aWFtQHRoZWdlbnRsZW1lbg==", "desc": ""}, {"company": "Flexform", "date": "2026-03-18", "attacker": "Dragonforce", "location": "Unknown", "industry": "", "url": "https://www.ransomware.live/id/RmxleGZvcm1AZHJhZ29uZm9yY2U=", "desc": ""}];
        
        const industryIcons = {"Healthcare": "\ud83c\udfe5", "Financial": "\ud83c\udfe6", "Technology": "\ud83d\udcbb", "Government": "\ud83c\udfdb\ufe0f", "Education": "\ud83c\udf93", "Manufacturing": "\ud83c\udfed", "Retail": "\ud83c\udfea", "Transportation": "\u2708\ufe0f", "Energy": "\u26a1"};
        
        function renderBreaches(data) {
            const grid = document.getElementById('breachGrid');
            const count = document.getElementById('showingCount');
            const noResults = document.getElementById('noResults');
            
            count.textContent = data.length;
            
            if (data.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            grid.innerHTML = data.map(b => `
                <div class="breach-card">
                    <div class="breach-card-header">
                        <a href="${b.url}" target="_blank" class="company-name">${b.company}</a>
                        ${b.industry ? `<span class="industry-badge">${industryIcons[b.industry] || ''} ${b.industry}</span>` : ''}
                    </div>
                    <div class="breach-meta">
                        <div class="meta-item">
                            <span>📅</span> ${b.date}
                        </div>
                        <div class="meta-item">
                            <span>📍</span> ${b.location}
                        </div>
                    </div>
                    ${b.attacker !== 'Unknown' ? `<span class="attacker-tag">💀 ${b.attacker}</span>` : ''}
                </div>
            `).join('');
        }
        
        function filter() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const industry = document.getElementById('industryFilter').value;
            const attacker = document.getElementById('attackerFilter').value;
            const date = document.getElementById('dateFilter').value;
            
            const filtered = breaches.filter(b => {
                const matchSearch = !search || b.company.toLowerCase().includes(search) || b.attacker.toLowerCase().includes(search);
                const matchIndustry = !industry || b.industry === industry;
                const matchAttacker = !attacker || b.attacker === attacker;
                const matchDate = !date || b.date === date;
                return matchSearch && matchIndustry && matchAttacker && matchDate;
            });
            
            renderBreaches(filtered);
        }
        
        function filterByIndustry(ind) {
            document.getElementById('industryFilter').value = ind;
            filter();
        }
        
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('industryFilter').value = '';
            document.getElementById('attackerFilter').value = '';
            document.getElementById('dateFilter').value = '';
            filter();
        }
        
        document.getElementById('searchInput').addEventListener('input', filter);
        document.getElementById('industryFilter').addEventListener('change', filter);
        document.getElementById('attackerFilter').addEventListener('change', filter);
        document.getElementById('dateFilter').addEventListener('change', filter);
        
        // Initial render
        renderBreaches(breaches);
    </script>
</body>
